<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 日报/周报生成器</title>
  
  <!-- SEO 设置 -->
  <meta name="description" content="输入工作要点，选择语气与长度，AI 即刻生成结构化的日报/周报。支持中英西法、模板化结构、复制/导出，一键翻译与二次编辑。">
  <meta name="keywords" content="AI 日报, AI 周报, 工作总结 生成器, 周报模板, 日报模板, 工作汇报, 报告生成器">
  <meta property="og:title" content="AI 日报/周报生成器｜输入要点，一键成稿（支持中英西法）">
  <meta property="og:description" content="输入工作要点，选择语气与长度，AI 即刻生成结构化的日报/周报。">
  <meta property="og:image" content="your-image-url.jpg">
  <meta property="og:url" content="https://ai-report-generator1.netlify.app">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AI 日报/周报生成器">
  <meta name="twitter:description" content="输入工作要点，选择语气与长度，AI 即刻生成结构化的日报/周报。">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 工作要点输入框 -->
    <label for="workPoints">工作要点</label>
    <textarea id="workPoints" placeholder="输入工作要点..." aria-label="输入工作要点"></textarea>

    <!-- 生成报告按钮 -->
    <button id="generateButton" aria-live="assertive">生成报告</button>
    
    <!-- 加载状态 -->
    <div id="loadingSpinner" style="display: none;">加载中...</div>

    <!-- 生成的报告 -->
    <label for="reportText">生成的报告</label>
    <textarea id="reportText" readonly aria-label="生成的报告"></textarea>

    <!-- 复制按钮 -->
    <button id="copyButton" aria-live="assertive">复制结果</button>

    <!-- 复制成功提示 -->
    <div id="toast" style="display: none;">已复制到剪贴板</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
