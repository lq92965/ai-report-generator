<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings - Reportify AI</title>
    <link rel="stylesheet" href="style.css?v=2026.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #f8f9fa;">
<header class="main-header account-header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px;">
        <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
             <img src="logo-3d.png" alt="Reportify AI Logo" style="width: 40px; height: 40px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
             <span style="font-size: 1.25rem; font-weight: 800; color: #1a1a1a; font-family: 'Inter', sans-serif;">Reportify AI</span>
         </a>

        <div style="display: flex; align-items: center;">
            <a href="usage.html#share-area" class="btn-credits" style="
                background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
                color: white !important;
                padding: 8px 18px;
                border-radius: 20px;
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                margin-right: 15px;
                display: inline-flex;
                align-items: center;
                transition: transform 0.2s, box-shadow 0.2s;
                box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
                z-index: 100;
            " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                Invite & Earn
            </a>
            <div id="auth-container" class="header-actions"></div>
        </div>
    </div>
</header>

    <section class="generator-section">
        <div class="container">
            <a href="account.html" class="btn-back">&larr; Back to Account Hub</a>

            <h2 class="section-title">Security</h2>

            <div class="account-container">
                <div class="account-profile-form">
                    <h3>Change Password</h3>
                    <form id="change-password-form" onsubmit="return false;">
                        <div class="input-wrapper">
                            <label for="old-password">Current Password</label>
                            <div style="position: relative;">
                                <input type="password" id="old-password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label for="new-password">New Password</label>
                            <div style="position: relative;">
                                <input type="password" id="new-password" required minlength="8" style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            
                            <div id="security-password-strength-box" class="mt-2 text-xs hidden" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-top: 10px;">
                                <div id="sec-req-length" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> 8+ chars</div>
                                <div id="sec-req-upper" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> Uppercase</div>
                                <div id="sec-req-number" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> Number</div>
                                <div id="sec-req-special" class="flex items-center text-gray-500"><i class="far fa-circle mr-2 w-4"></i> Symbol</div>
                            </div>
                            <div id="security-pwd-feedback" style="display: none; margin-top: 8px;"></div>
                        </div>
                        <div class="input-wrapper">
                            <label for="confirm-password">Confirm New Password</label>
                            <div style="position: relative;">
                                <input type="password" id="confirm-password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Password</button>
                        <p id="password-status" class="status-message"></p>
                    </form>
                    
                    <hr class="section-divider"> 
                    
                    <div class="danger-zone">
                        <h3>Danger Zone</h3>
                        <p>Once you delete your account, there is no going back. Please be certain.</p>
                        <button type="button" id="delete-account-btn" class="btn btn-danger">Delete My Account</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Reportify AI. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js?v=2026.2"></script>
</body>
</html>
