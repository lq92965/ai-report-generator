<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Security Settings - Reportify AI</title>
    <link rel="stylesheet" href="style.css?v=2026.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="mobile-patch.css">
    <script src="mobile-patch.js"></script>
</head>
<body class="has-app-nav" style="background-color: #f8f9fa;">
    <header class="main-header account-header pwa-app-header" style="background: #fff; border-bottom: 1px solid #e2e8f0;">
        <div class="container pwa-header-inner" style="max-width: 1200px;">
            <div class="pwa-header-leading flex items-center min-w-0 flex-shrink-0 max-w-[60%]">
                <a href="account.html" class="unified-back-btn"><span class="back-arrow">←</span><span class="back-text">Back to Account Hub</span></a>
            </div>
            <div class="pwa-header-actions" style="display: flex; align-items: center; margin-left: auto;">
                <a href="usage.html#share-area" class="pwa-invite-icon-btn" title="Invite" aria-label="Invite" style="margin-right: 12px;">
                    <span class="pwa-invite-lucide"><i data-lucide="gift"></i></span>
                </a>
                <div id="auth-container" class="header-actions"></div>
            </div>
        </div>
    </header>

    <section class="generator-section">
        <div class="container">
            <h2 class="section-title">Security</h2>

            <div class="account-container">
                <div class="account-profile-form">
                    <h3>Change Password</h3>
                    <form id="change-password-form" onsubmit="return false;">
                        <div class="input-wrapper">
                            <label for="old-password">Current Password</label>
                            <div style="position: relative;">
                                <input type="password" id="old-password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label for="new-password">New Password</label>
                            <div style="position: relative;">
                                <input type="password" id="new-password" required minlength="8" style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            
                            <div id="security-password-strength-box" class="mt-2 text-xs hidden" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-top: 10px;">
                                <div id="sec-req-length" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> 8+ chars</div>
                                <div id="sec-req-upper" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> Uppercase</div>
                                <div id="sec-req-number" class="flex items-center text-gray-500 mb-1"><i class="far fa-circle mr-2 w-4"></i> Number</div>
                                <div id="sec-req-special" class="flex items-center text-gray-500"><i class="far fa-circle mr-2 w-4"></i> Symbol</div>
                            </div>
                            <div id="security-pwd-feedback" style="display: none; margin-top: 8px;"></div>
                        </div>
                        <div class="input-wrapper">
                            <label for="confirm-password">Confirm New Password</label>
                            <div style="position: relative;">
                                <input type="password" id="confirm-password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Password</button>
                        <p id="password-status" class="status-message"></p>
                    </form>
                    
                    <hr class="section-divider"> 
                    
                    <div class="danger-zone">
                        <h3>Danger Zone</h3>
                        <p>Once you delete your account, there is no going back. Please be certain.</p>
                        <button type="button" id="delete-account-btn" class="btn btn-danger">Delete My Account</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Reportify AI. All Rights Reserved.</p>
        </div>
    </footer>

    <nav id="app-bottom-nav" class="app-bottom-nav" aria-label="Main navigation">
        <a href="index.html" class="app-nav-item" data-nav="home"><span class="app-nav-icon"><i data-lucide="home"></i></span><span class="app-nav-label">Home</span></a>
        <a href="generate.html" class="app-nav-item" data-nav="generate"><span class="app-nav-icon"><i data-lucide="sparkles"></i></span><span class="app-nav-label">Generate</span></a>
        <a href="news.html" class="app-nav-item" data-nav="news"><span class="app-nav-icon"><i data-lucide="newspaper"></i></span><span class="app-nav-label">News</span></a>
        <a href="blog.html" class="app-nav-item" data-nav="blog"><span class="app-nav-icon"><i data-lucide="book-open"></i></span><span class="app-nav-label">Blog</span></a>
        <a href="account.html" class="app-nav-item" data-nav="mine"><span class="app-nav-icon"><i data-lucide="circle-user"></i></span><span class="app-nav-label">Mine</span></a>
    </nav>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="pwa-nav.js"></script>
    <script src="script.js"></script>
</body>
</html>
