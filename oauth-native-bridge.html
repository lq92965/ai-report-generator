<!DOCTYPE html>
<!-- Native OAuth: short ?bridge=… in URL → intent://…?bridge=… (small) → App exchanges via /api/oauth/bridge-token -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Signing in…</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px 20px 40px;
      color: #374151;
      text-align: center;
      max-width: 420px;
      margin: 0 auto;
    }
    #msg { font-size: 15px; line-height: 1.55; margin: 0 0 20px; }
    .btn {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #2563eb;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .btn:active { background: #1d4ed8; }
    .btn-secondary {
      background: #f3f4f6;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }
    .hint { font-size: 13px; color: #6b7280; margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <p id="msg">Opening Reportify AI…</p>
  <a id="open-app" class="btn" href="#">Open Reportify AI</a>
  <a id="open-fallback" class="btn btn-secondary" href="#" style="display:none">Alternate: open app link</a>
  <p class="hint">If nothing happens, rebuild the app with Android deep links (see project docs), or try the alternate button.</p>
  <script>
(function () {
  var PACKAGE = 'com.crickettechnology.reportifyai';
  var SCHEME = 'com.crickettechnology.reportifyai';
  var p = new URLSearchParams(window.location.search);
  var token = p.get('token');
  var bridge = p.get('bridge');
  var err = p.get('error');
  var msgEl = document.getElementById('msg');
  var primary = document.getElementById('open-app');
  var fallback = document.getElementById('open-fallback');

  if (!token && !bridge && !err) {
    msgEl.textContent = 'Invalid sign-in callback.';
    primary.style.display = 'none';
    return;
  }

  var qs;
  if (err) {
    qs = 'error=' + encodeURIComponent(err);
  } else if (bridge) {
    qs = 'bridge=' + encodeURIComponent(bridge);
  } else {
    qs = 'token=' + encodeURIComponent(token);
  }

  var customUrl = SCHEME + '://oauth?' + qs;
  var isAndroid = /Android/i.test(navigator.userAgent);

  function androidIntentUrl() {
    return 'intent://oauth?' + qs + '#Intent;scheme=' + SCHEME + ';package=' + PACKAGE + ';end';
  }

  /* 不要用 JS 拦截点击：让浏览器走默认导航（intent:// 在用户手势下才稳定） */
  if (isAndroid) {
    primary.href = androidIntentUrl();
    fallback.href = customUrl;
    fallback.style.display = 'inline-block';
    fallback.textContent = 'Alternate: open app link';
  } else {
    primary.href = customUrl;
  }

  setTimeout(function () {
    msgEl.textContent = 'Tap “Open Reportify AI” to return to the app.';
  }, 400);
})();
  </script>
</body>
</html>
