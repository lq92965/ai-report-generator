# ---- www → non-www 重定向 (HTTPS) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.goreportify.com;

    ssl_certificate /etc/letsencrypt/live/goreportify.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goreportify.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://goreportify.com$request_uri;
}

# ---- www → non-www 重定向 (HTTP) ----
server {
    listen 80;
    listen [::]:80;
    server_name www.goreportify.com;
    return 301 https://goreportify.com$request_uri;
}

# ---- 主站 goreportify.com (HTTPS) ----
server {
    server_name goreportify.com;

    root /root/ai-report-generator;

    index index.html;

    # ---- Gzip 压缩优化 ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/atom+xml application/rss+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # ---- 静态资源缓存（30天） ----
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|webp|avif|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff";
    }

    # ---- HTML 缓存（1小时） ----
    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- 旧URL重定向 ----
    location ~ ^/(blog|news)-[0-9]+\.html$ {
        return 301 /article-pages$uri;
    }

    location = /llms.txt {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 安全 ----
    location ~ /\.(git|svn|hg) { deny all; }
    location ~ /\.env { deny all; }
    location ~* ^/(server\.js|google-play-billing\.js|index\.js|package\.json|package-lock\.json|amber_engine\.cjs)$ { deny all; }
    location ^~ /node_modules/ { deny all; }
    location ^~ /android/ { deny all; }
    location ^~ /.github/ { deny all; }

    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    ssl_certificate /etc/letsencrypt/live/goreportify.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goreportify.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- goreportify.com HTTP → HTTPS 重定向 ----
server {
    listen 80;
    listen [::]:80;
    server_name goreportify.com;
    return 301 https://goreportify.com$request_uri;
}
